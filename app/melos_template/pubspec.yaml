name: flutter_app_template
description: A new Flutter project.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  core_ui:
    path: ../../packages/ui
  core_network:
    path: ../../packages/network
  core_di_provider:
    path: ../../packages/di_provider
  core_foundation:
    path: ../../packages/foundation
  core_repository:
    path: ../../packages/repository
  timeago: ^3.7.0
  firebase_auth: ^5.3.1
  firebase_analytics: ^11.3.3
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  flutter_native_splash: ^2.4.1
  flutter_riverpod: ^2.5.1
  flutter_localization: ^0.2.2
  go_router: ^14.2.8
  go_router_builder: ^2.7.1
  google_fonts: ^4.0.4
  riverpod_annotation: ^2.3.5
  riverpod_generator: ^2.4.0
  shared_preferences: ^2.3.2
  flutter_launcher_icons: ^0.14.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0
dev_dependencies:
  cider: ^0.2.8
  build_runner: ^2.4.9
  freezed: ^2.4.5
  json_serializable: ^6.7.1

  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/icons/



flutter_icons:
  android: true
  ios: true
  assets:
    - ./assets/images/
    - ./assets/images/icons/dev.png
    - ./assets/images/icons/prod.png
    - ./assets/images/icons/stg.png


flutter_native_splash:
  color: '#add8e6'
  image: 'assets/images/splash.png'
  color_dark: '#262626'
  image_dark: 'assets/images/splash.png'
  fullscreen: true
  android_12:
    icon_background_color: '#add8e6'
    image: 'assets/images/splash.png'
    icon_background_color_dark: '#262626'
    image_dark: 'assets/images/splash.png'

